<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitebox Cart</title>
     <script src="https://kit.fontawesome.com/e63b4d993e.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon-16x16.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
</head>
<body>
    <header>
        <nav>
            <div>
                <!-- Logo -->
                 <img src="images/logo.jpeg" alt="Logo" width="150px">
                 <!-- Menu -->
            </div>
              <ul>
                    <li><a href="Home.html" class="active">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="Bitedeal.html">Bite Deal</a></li>
                    <li><a href="Cart.html"><i class="fa-solid fa-cart-arrow-down"></i> Cart </a></li>
                    <li><a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i> Login </a></li>
                  </ul>
        </nav>
    </header>

    <section class="cart">
        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>

            <tbody>
                <tr>
                    <td class="item">
                        <img src="images/Burger-card1.jpeg">
                        <div>
                            <h4>Burger</h4>
                            <p>Cheese Burger</p>                       
                         </div>
                    </td>
                    <td>₹159</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>₹159</td>
                    <td><button class="remove">X</button></td>
                </tr>
              

                <tr>
                    <td class="item">
                        <img src="images/Alfredo pasta-card4.jpeg">
                        <div>
                            <h4>Alfredo Pasta</h4>
                            <p>Creamy White Sauce Pasta</p>                       
                         </div>
                    </td>
                    <td>₹249</td>
                    <td>
                        <div class="qty-box">
                            <button>-</button>
                            <span>1</span>
                            <button>+</button>
                        </div>
                    </td>
                    <td>₹249</td>
                    <td><button class="remove">X</button></td>
                </tr>
                <tr class="grand-total">
                    <td colspan="3">Grand Total</td>
                    <td>₹408</td>
                    <td><button>Proceed</button></td>
                </tr>



            </tbody>
        </table>
    </section>







</body>
</html>
